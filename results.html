
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 40px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .results-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        .results-table td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .results-table tr:hover {
            background: #f5f5f5;
        }

        .rank-1 {
            background: #fff3cd;
            font-weight: bold;
        }

        .rank-2 {
            background: #e7f3ff;
        }

        .rank-3 {
            background: #f0f0f0;
        }

        .winner-banner {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .winner-banner h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .winner-banner .trophy {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .winner-banner .points {
            font-size: 28px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: #f44336;
            color: white;
        }

        .reset-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .no-votes {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Voting Results</h1>
        <p class="subtitle">Live results from class presentation voting</p>

        <div class="controls">
            <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Results</button>
            <button class="reset-btn" onclick="resetAllVotes()">🗑️ Clear All Votes</button>
        </div>

        <div id="noVotesMessage" class="no-votes" style="display: none;">
            No votes recorded yet. Start voting!
        </div>

        <div id="resultsContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalVotes">0</div>
                    <div class="stat-label">Total Votes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalPoints">0</div>
                    <div class="stat-label">Total Points</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="winnerName">-</div>
                    <div class="stat-label">Winner</div>
                </div>
            </div>

            <div id="winnerBanner" style="display: none;">
                <div class="winner-banner">
                    <div class="trophy">🏆</div>
                    <h2 id="winnerTitle">Congratulations!</h2>
                    <div class="points" id="winnerPoints">0 points</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="resultsChart"></canvas>
            </div>

            <h3 style="margin-bottom: 20px; color: #333;">Detailed Rankings</h3>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Group</th>
                        <th>Total Points</th>
                        <th>1st Place Votes</th>
                        <th>2nd Place Votes</th>
                        <th>3rd Place Votes</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>

        <div class="back-link">
            <a href="voting_form.html">← Back to Voting</a>
        </div>
    </div>

    <script>
        let chart = null;

        function calculateResults() {
            const votes = JSON.parse(localStorage.getItem('classVotes')) || [];

            if (votes.length === 0) {
                document.getElementById('noVotesMessage').style.display = 'block';
                document.getElementById('resultsContent').style.display = 'none';
                return;
            }

            document.getElementById('noVotesMessage').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'block';

            // Initialize scores
            const scores = {
                'Group 1': { total: 0, first: 0, second: 0, third: 0 },
                'Group 2': { total: 0, first: 0, second: 0, third: 0 },
                'Group 3': { total: 0, first: 0, second: 0, third: 0 },
                'Group 4': { total: 0, first: 0, second: 0, third: 0 },
                'Group 5': { total: 0, first: 0, second: 0, third: 0 }
            };

            // Calculate scores
            votes.forEach(vote => {
                scores[vote.first].total += 3;
                scores[vote.first].first += 1;

                scores[vote.second].total += 2;
                scores[vote.second].second += 1;

                scores[vote.third].total += 1;
                scores[vote.third].third += 1;
            });

            // Sort by total points
            const sorted = Object.entries(scores)
                .sort((a, b) => b[1].total - a[1].total)
                .map(([group, data], index) => ({
                    rank: index + 1,
                    group: group,
                    ...data
                }));

            // Update stats
            document.getElementById('totalVotes').textContent = votes.length;
            const totalPoints = Object.values(scores).reduce((sum, s) => sum + s.total, 0);
            document.getElementById('totalPoints').textContent = totalPoints;

            // Update winner
            const winner = sorted[0];
            document.getElementById('winnerName').textContent = winner.group;
            document.getElementById('winnerTitle').textContent = `🎉 ${winner.group} Wins!`;
            document.getElementById('winnerPoints').textContent = `${winner.total} points`;
            document.getElementById('winnerBanner').style.display = 'block';

            // Update table
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            sorted.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = row.rank === 1 ? 'rank-1' : row.rank === 2 ? 'rank-2' : 'rank-3';
                tr.innerHTML = `
                    <td><strong>#${row.rank}</strong></td>
                    <td>${row.group}</td>
                    <td><strong>${row.total}</strong></td>
                    <td>${row.first}</td>
                    <td>${row.second}</td>
                    <td>${row.third}</td>
                `;
                tbody.appendChild(tr);
            });

            // Update chart
            updateChart(sorted);
        }

        function updateChart(data) {
            const ctx = document.getElementById('resultsChart').getContext('2d');

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.group),
                    datasets: [
                        {
                            label: '1st Place (3 pts)',
                            data: data.map(d => d.first * 3),
                            backgroundColor: '#FFD700',
                            borderColor: '#FFA500',
                            borderWidth: 2
                        },
                        {
                            label: '2nd Place (2 pts)',
                            data: data.map(d => d.second * 2),
                            backgroundColor: '#C0C0C0',
                            borderColor: '#808080',
                            borderWidth: 2
                        },
                        {
                            label: '3rd Place (1 pt)',
                            data: data.map(d => d.third * 1),
                            backgroundColor: '#CD7F32',
                            borderColor: '#8B4513',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true,
                            ticks: {
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                }
                            }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: {
                                font: {
                                    size: 12
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: {
                                    size: 14
                                },
                                padding: 15
                            }
                        },
                        title: {
                            display: true,
                            text: 'Points by Placement',
                            font: {
                                size: 16,
                                weight: 'bold'
                            }
                        }
                    }
                }
            });
        }

        function resetAllVotes() {
            if (confirm('Are you sure you want to delete ALL votes? This cannot be undone.')) {
                localStorage.removeItem('classVotes');
                location.reload();
            }
        }

        // Load results on page load
        calculateResults();

        // Auto-refresh every 5 seconds
        setInterval(calculateResults, 5000);
    </script>
</body>
</html>
